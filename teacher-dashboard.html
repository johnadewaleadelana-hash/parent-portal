<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-chalkboard-teacher"></i> Teacher Portal</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><span class="nav-link text-light" id="teacherNameDisplay"><i class="fas fa-user"></i> Teacher</span></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="teacherLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h4><i class="fas fa-chart-line"></i> Dashboard</h4>
                <p class="text-muted" id="teacherInfo">Welcome</p>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3"><div class="card text-white bg-primary mb-3"><div class="card-body"><h6>Students</h6><h2 id="statStudents">0</h2></div></div></div>
            <div class="col-md-3"><div class="card text-white bg-success mb-3"><div class="card-body"><h6>Subjects</h6><h2 id="statSubjects">0</h2></div></div></div>
            <div class="col-md-3"><div class="card text-white bg-info mb-3"><div class="card-body"><h6>Class</h6><h2 id="statClass">-</h2></div></div></div>
            <div class="col-md-3"><div class="card text-white bg-warning mb-3"><div class="card-body"><h6>Scores Entered</h6><h2 id="statScores">0</h2></div></div></div>
        </div>
        <div class="row mt-4">
            <div class="col-12"><div class="card shadow-sm"><div class="card-header"><h5><i class="fas fa-bolt"></i> Quick Actions</h5></div><div class="card-body"><div class="row">
                <div class="col-md-3 mb-3"><div class="text-center p-3 border rounded" onclick="location.href='teacher-scores.html'" style="cursor:pointer;"><i class="fas fa-edit fa-2x text-danger"></i><h6 class="mt-2">Enter Scores</h6><small class="text-muted">Record student scores</small></div></div>
                <div class="col-md-3 mb-3"><div class="text-center p-3 border rounded" onclick="location.href='teacher-attendance.html'" style="cursor:pointer;"><i class="fas fa-calendar-check fa-2x text-success"></i><h6 class="mt-2">Attendance</h6><small class="text-muted">Record attendance</small></div></div>
                <div class="col-md-3 mb-3"><div class="text-center p-3 border rounded" onclick="location.href='teacher-behavioral.html'" style="cursor:pointer;"><i class="fas fa-smile fa-2x text-warning"></i><h6 class="mt-2">Behavioral</h6><small class="text-muted">Rate student behavior</small></div></div>
                <div class="col-md-3 mb-3"><div class="text-center p-3 border rounded" onclick="location.href='teacher-comments.html'" style="cursor:pointer;"><i class="fas fa-comment fa-2x text-info"></i><h6 class="mt-2">Comments</h6><small class="text-muted">Write student comments</small></div></div>
            </div><div class="row">
                <div class="col-md-3 mb-3"><div class="text-center p-3 border rounded" onclick="location.href='teacher-reports.html'" style="cursor:pointer;"><i class="fas fa-file-alt fa-2x text-dark"></i><h6 class="mt-2">Reports</h6><small class="text-muted">View student reports</small></div></div>
            </div></div></div></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/teacher-dashboard.js"></script>
</body>
</html>
