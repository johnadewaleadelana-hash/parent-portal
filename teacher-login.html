<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: linear-gradient(135deg, #1a237e, #0d47a1); min-height: 100vh; }
        .login-card { max-width: 420px; margin: 0 auto; }
        .teacher-icon { width: 80px; height: 80px; background: #e8eaf6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 login-card">
                <div class="card-body p-5">
                    <div class="teacher-icon mb-3">
                        <i class="fas fa-chalkboard-teacher fa-2x text-primary"></i>
                    </div>
                    <div class="text-center mb-4">
                        <h4 class="fw-bold">Teacher Login</h4>
                        <p class="text-muted small">Sign in to access your portal</p>
                    </div>
                    <form id="teacherLoginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" class="form-control form-control-lg" id="teacherEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" class="form-control form-control-lg" id="teacherPassword" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100" id="loginBtn">
                            <span id="loginText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                            <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
                        </button>
                    </form>
                    <div id="errorMessage" class="alert alert-danger mt-3 d-none">
                        <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                    </div>
                    <div class="text-center mt-3">
                        <a href="index.html" class="text-muted small"><i class="fas fa-arrow-left"></i> Back to Parent Portal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/teacher-login.js"></script>
</body>
</html>
