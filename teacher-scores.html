<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Teacher - Enter Scores</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css"></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container"><a class="navbar-brand" href="teacher-dashboard.html"><i class="fas fa-chalkboard-teacher"></i> Teacher Portal</a>
<ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="teacher-dashboard.html"><i class="fas fa-arrow-left"></i> Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="#" onclick="teacherLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li></ul></div></nav>
<div class="container mt-4">
<div class="d-flex justify-content-between align-items-center mb-3"><div><h4><i class="fas fa-edit"></i> Enter Scores</h4><p class="text-muted" id="teacherInfo">Loading...</p></div></div>
<div class="row mb-3">
<div class="col-md-4"><label>Subject</label><select class="form-select" id="scoreSubject" onchange="loadScores()"><option value="">Select subject...</option></select></div>
<div class="col-md-3"><label>Term</label><select class="form-select" id="scoreTerm"><option value="1">Term 1</option><option value="2">Term 2</option><option value="3" selected>Term 3</option></select></div>
<div class="col-md-3"><label>&nbsp;</label><button class="btn btn-success w-100" onclick="saveAllScores()"><i class="fas fa-save"></i> Save All</button></div>
</div>
<div id="scoresContainer"><div class="text-center py-5 text-muted"><i class="fas fa-edit fa-3x mb-3"></i><p>Select a subject to enter scores</p></div></div>
<div class="row mt-2" id="summaryStats" style="display:none"><div class="col-md-4"><div class="card bg-light"><div class="card-body text-center"><h6>Students</h6><h3 id="totalStudentsStat">0</h3></div></div></div>
<div class="col-md-4"><div class="card bg-light"><div class="card-body text-center"><h6>Filled</h6><h3 id="scoresEnteredStat">0%</h3></div></div></div>
<div class="col-md-4"><div class="card bg-light"><div class="card-body text-center"><h6>Class Avg</h6><h3 id="classAverageStat">0.0</h3></div></div></div></div>
</div>
<div class="toast-container position-fixed bottom-0 end-0 p-3"><div id="toastMessage" class="toast align-items-center text-white border-0"><div class="d-flex"><div class="toast-body" id="toastBody"></div><button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/parent-api.js"></script>
<script src="js/teacher-scores.js"></script>
</body>
</html>
